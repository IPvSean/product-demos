---
patch-cloud-stack:
  description: >-
    Enterprise-grade patching workflow with snapshot safety, parallel RHEL and Windows paths,
    automatic restore on failure, and a consolidated HTML compliance report. Based on
    jopaik/patch_demo, this workflow covers both operating systems in a single execution
    against the VMs deployed by Deploy Cloud Stack in AWS.
  one_liner: "Snapshot → Pre-check → Patch → Post-check → Compliance Report, with automatic restore on failure"
  why_it_matters:
    - Demonstrates day-2 operations at scale — patching is the number one use case customers ask about
    - Parallel RHEL and Windows paths show AAP managing heterogeneous environments in one workflow
    - Snapshot-based restore provides a safety net that resonates with change-management audiences
    - The HTML compliance report is a tangible artifact you can show stakeholders
    - Covers targeted advisory patching (RHSA/CVE for RHEL, KB for Windows), not just "update everything"
  prerequisites:
    - "<strong>If using RHDP (demo.redhat.com):</strong> Run <strong>APD | Multi-demo setup</strong> — this configures all demo categories at once, including the cloud patching templates and credentials. AWS and APD Machine credentials are pre-configured for you."
    - "<strong>If using your own installation:</strong> Run <strong>APD | Single demo setup</strong> and choose <code>cloud</code>. You will also need to configure the <strong>AWS</strong> credential (Access Key + Secret Key), add an SSH private key and Windows username/password to <strong>APD Machine Credential</strong>, and ensure you have the target VMs, VPC, and keypair provisioned."
    - "Run <strong>Deploy Cloud Stack in AWS</strong> to create the five target VMs (aws_rhel8, aws_rhel9, aws-dc, aws_win1, reports)"
    - "<strong>RHSM Registration credential:</strong> Fill in your Red Hat org ID and activation key (see credential setup below). <strong>Without this, all RHEL patching steps are skipped</strong> — the workflow still succeeds but only Windows hosts actually get patched. RHEL hosts will show as SKIPPED/UNREGISTERED in the output and compliance report."
  survey_prompts:
    - question: AWS Region
      variable: aws_region
      type: multiplechoice
      required: "Yes"
    - question: RHEL Advisory IDs
      variable: input_cve_ids
      type: text
      required: "Yes"
    - question: Windows KB IDs
      variable: input_kb_ids
      type: text
      required: "Yes"
  credential_setup:
    title: Configure credentials before first run
    steps:
      - "<strong>AWS credential</strong> (pre-configured on demo.redhat.com)<strong>:</strong> Navigate to Resources → Credentials → <code>AWS</code>. Add your AWS Access Key and Secret Key. This is needed for EBS snapshot and restore operations. <em>If you ordered your environment from <a href='https://red.ht/apd-sandbox'>demo.redhat.com</a>, this credential is already configured for you. You only need to set this up if you are running APD on your own installation (homelab, customer site, etc.).</em>"
      - "<strong>APD Machine Credential</strong> (pre-configured on demo.redhat.com)<strong>:</strong> Navigate to Resources → Credentials → <code>APD Machine Credential</code>. Add an SSH private key (for Linux connections) and set the username/password (for Windows WinRM connections). <em>If you ordered your environment from <a href='https://red.ht/apd-sandbox'>demo.redhat.com</a>, this credential is already configured for you. You only need to set this up if you are running APD on your own installation.</em>"
      - "<strong>RHSM Registration</strong> (action required for everyone)<strong>:</strong> Navigate to Resources → Credentials → <code>RHSM Registration</code>. This credential was created by the setup job with placeholder values (<code>REPLACEME</code>). Fill in your Red Hat org ID and activation key so RHEL hosts can access advisory repos and get patched. <strong>Without valid RHSM credentials, RHEL patching is completely skipped</strong> — the workflow won't fail, but pre-check, patch, post-check, and rollback all show SKIPPED for RHEL hosts. Only Windows patching proceeds. The compliance report will show RHEL hosts as UNREGISTERED in grey. To find your org ID and create an activation key, visit <a href='https://console.redhat.com/insights/connector/activation-key'>console.redhat.com/insights/connector/activation-key</a>."
  walkthrough:
    - "<strong>Run setup:</strong> On RHDP (Red Hat Demo Platform), run <strong>APD | Multi-demo setup</strong> to configure everything. On your own install, run <strong>APD | Single demo setup</strong> → choose <code>cloud</code>. Then fill in the <strong>RHSM Registration</strong> credential with your org ID and activation key (see credential setup above)."
    - "<strong>Deploy the stack:</strong> Launch <strong>Deploy Cloud Stack in AWS</strong> to create the five target VMs. Wait for it to complete and verify the hosts appear in inventory."
    - "<strong>Set the stage:</strong> Show the audience the five VMs in AAP inventory (aws_rhel8, aws_rhel9, aws-dc, aws_win1, reports). Point out it's a mixed Linux/Windows fleet."
    - "<strong>Launch the workflow:</strong> Navigate to Templates → Patch Cloud Stack in AWS. Fill in the survey with a real RHSA/CVE and KB (defaults work). Launch."
    - "<strong>Snapshot step:</strong> While it runs, explain that the first node takes EBS snapshots of all instances — this is the safety net. 'If anything goes wrong during patching, we restore to this point.'"
    - "<strong>Parallel paths:</strong> Point out the RHEL and Windows pre-checks running simultaneously. 'One workflow, two operating systems, zero extra effort.'"
    - "<strong>Pre-check results:</strong> Show the debug output — which advisories are applicable, which hosts are already compliant. 'We check before we change.' <em>Note: If RHSM is not configured, RHEL hosts will show SKIPPED here — this is expected. Without RHSM registration, the hosts can't query Red Hat advisory repos, so all RHEL steps (pre-check, patch, post-check, rollback) are skipped. Windows patching proceeds normally regardless.</em>"
    - "<strong>Patching:</strong> The patch nodes apply only the targeted advisories. 'We're not running yum update — we're applying specific CVE fixes with an audit trail.'"
    - "<strong>Post-check / Restore:</strong> Show the success/failure routing. 'If post-check fails, the workflow automatically restores from snapshot. No manual intervention, no 3am pages.'"
    - "<strong>Compliance report:</strong> Navigate to http://reports/patch_report.html. Walk through the HTML dashboard — status per host, missing advisories, reboot needed. 'This is the artifact you hand to your auditor or change board.'"
  talking_points:
    - "This is a real-world patching workflow — not a hello-world demo. It mirrors what enterprises actually deploy with AAP."
    - "The parallel RHEL/Windows paths highlight AAP's ability to manage heterogeneous environments without separate tools."
    - "Snapshot-before-patch is a pattern customers love — it eliminates the fear of patching production systems."
    - "Targeted advisory patching (specific CVEs/KBs) versus blanket updates shows precision and auditability."
    - "The compliance report generates automatically — no separate CMDB integration needed for a quick compliance view."
    - "Unregistered RHEL hosts are handled gracefully — they show as SKIPPED, not as failures. If someone configures the RHSM credential, they auto-register."
  job_templates:
    - name: Cloud | AWS | Snapshot EC2
      playbook: cloud/snapshot_ec2.yml
      description: Takes EBS snapshots of target EC2 instances
    - name: Cloud | AWS | Patch Pre-check RHEL
      playbook: cloud/patch_pre_check_rhel.yml
      description: Queries dnf for targeted advisory applicability
    - name: Cloud | AWS | Patch RHEL
      playbook: cloud/patch_rhel.yml
      description: Applies specific RHSA/CVE advisories via dnf
    - name: Cloud | AWS | Patch Post-check RHEL
      playbook: cloud/patch_post_check_rhel.yml
      description: Verifies advisories are resolved after patching
    - name: Cloud | AWS | Patch Pre-check Windows
      playbook: cloud/patch_pre_check_windows.yml
      description: Queries Windows Update Agent for targeted KB applicability
    - name: Cloud | AWS | Patch Windows
      playbook: cloud/patch_windows.yml
      description: Installs specific KB updates via win_updates
    - name: Cloud | AWS | Patch Post-check Windows
      playbook: cloud/patch_post_check_windows.yml
      description: Verifies KBs are installed after patching
    - name: Cloud | AWS | Restore EC2 from Snapshot
      playbook: cloud/restore_ec2.yml
      description: Restores EC2 volumes from latest EBS snapshot
    - name: Cloud | AWS | Patch Compliance Report
      playbook: cloud/patch_compliance_report.yml
      description: Generates HTML compliance dashboard on the reports server
  related_demos:
    - "<strong>Deploy Cloud Stack in AWS</strong> — Required prerequisite; creates the five target VMs"
    - "<strong>Linux | Patching</strong> — Standalone Linux patching job (simpler, no workflow)"
    - "<strong>Linux | Register with Insights</strong> — Register RHEL hosts with RHSM for full advisory access"

cloud-destroy-stack:
  description: >-
    Tears down everything created by Deploy Cloud Stack in AWS — terminates all five stack VMs
    in parallel, deletes the VPC and related networking resources, deletes the keypair, and
    re-syncs the AWS dynamic inventory so hosts are removed from AAP.
  one_liner: "Clean teardown of the full demo environment in one workflow"
  prerequisites:
    - A stack previously deployed with <strong>Deploy Cloud Stack in AWS</strong>
    - AWS credential configured
  survey_prompts:
    - question: AWS Region
      variable: aws_region
      type: multiplechoice
      required: "Yes"
  walkthrough:
    - "<strong>When to use:</strong> Run this at the end of a demo session or when you need to start fresh. It's safe to run even if some VMs are already terminated."
    - "<strong>Launch:</strong> Select the same AWS region used for Deploy. The workflow handles everything else."
    - "<strong>Watch the parallel teardown:</strong> All five VMs are terminated simultaneously, then VPC and keypair cleanup happens."
  related_demos:
    - "<strong>Deploy Cloud Stack in AWS</strong> — The matching provisioning workflow"

deploy-cloud-stack:
  description: >-
    Provisions the full demo infrastructure in AWS: VPC, keypair, five VMs (two Windows, two RHEL, one reports server),
    dynamic inventory sync, and a VPC report published to S3. This is the starting point for most cloud, Linux, and
    Windows demos.
  one_liner: "One workflow deploys everything you need for hands-on demos"
  why_it_matters:
    - Creates a complete demo environment in minutes — no manual AWS console clicking
    - Configuration-as-code for infrastructure — the entire stack is defined in playbooks and blueprints
    - Mixed OS fleet (RHEL 8, RHEL 9, Windows Server) reflects real customer environments
    - Dynamic inventory automatically imports all provisioned VMs into AAP
  prerequisites:
    - "<strong>If using RHDP (demo.redhat.com):</strong> Run <strong>APD | Multi-demo setup</strong> to configure all templates and credentials. AWS and APD Machine credentials are pre-configured for you."
    - "<strong>If using your own installation:</strong> Run <strong>APD | Single demo setup</strong> and choose <code>cloud</code>. Configure the <strong>AWS</strong> credential with your Access Key and Secret Key, and add an SSH private key to <strong>APD Machine Credential</strong>."
  survey_prompts:
    - question: AWS Region
      variable: aws_region
      type: multiplechoice
      required: "Yes"
    - question: Owner
      variable: owner_tag
      type: text
      required: "Yes"
    - question: Environment
      variable: env
      type: multiplechoice
      required: "Yes"
    - question: Email
      variable: email
      type: text
      required: "Yes"
  walkthrough:
    - "<strong>Show the survey:</strong> Walk through each field — region, owner, environment. Explain how surveys make self-service provisioning safe."
    - "<strong>Launch:</strong> Start the workflow. As nodes light up, explain the sequence: keypair → VPC → parallel VM creation → inventory sync."
    - "<strong>Parallel VM creation:</strong> Point out that all five VMs deploy simultaneously. 'This is the power of workflow nodes — parallel execution with dependency management.'"
    - "<strong>Inventory sync:</strong> After VMs are created, the dynamic inventory syncs automatically. Show the new hosts appearing in AAP."
    - "<strong>VPC report:</strong> Show the S3 report — a visual summary of what was built."
    - "<strong>Transition:</strong> 'Now that we have infrastructure, let's do something with it' — pivot to patching, compliance, or other demos."
  related_demos:
    - "<strong>Patch Cloud Stack in AWS</strong> — Run this after deploying to demonstrate day-2 patching"
    - "<strong>Destroy Cloud Stack in AWS</strong> — Tear down everything when done"
    - "<strong>Linux | Fact Scan</strong> — Gather facts from the newly deployed RHEL hosts"

linux-patching:
  description: >-
    Apply security updates to RHEL servers and generate an HTML patch report. The playbook
    installs yum-utils, applies patches via the demo.patching.patch_linux role, optionally
    triggers an Insights Client scan, and publishes a patching compliance report to a
    dedicated report server. Runs in check mode by default so you can audit before applying.
  one_liner: "Audit or apply Linux patches with a one-click compliance report"
  why_it_matters:
    - Patching is the number one use case customers ask about — this demo addresses it directly
    - Check mode lets you show a safe audit-first workflow before committing changes
    - The HTML report gives stakeholders a tangible artifact without a separate CMDB integration
    - Insights Client integration shows how AAP and Red Hat Insights work together for visibility
    - Demonstrates role-based content reuse with the demo.patching collection
  prerequisites:
    - Linux hosts in the <strong>Ansible Product Demos Inventory</strong>
    - SSH connectivity via <strong>APD Machine Credential</strong>
    - A host named <code>reports</code> in inventory to receive the HTML report (deployed by <strong>Deploy Cloud Stack in AWS</strong>)
    - (Optional) Insights Client configured on target hosts for post-patch scanning
  survey_prompts:
    - question: Server Name or Pattern
      variable: _hosts
      type: text
      required: "Yes"
  walkthrough:
    - "<strong>Explain check mode:</strong> Show the audience that this template defaults to check mode. 'We can audit what would change before we touch a single package.'"
    - "<strong>Launch in check mode:</strong> Run against a group of RHEL hosts. Walk through the output — which packages would be updated, which hosts are already current."
    - "<strong>Switch to run mode:</strong> Re-launch the job and change the job type to Run. 'Now we apply the patches for real — same playbook, same survey, different intent.'"
    - "<strong>Show the report:</strong> Navigate to the reports server and open the patching report. Walk through the per-host breakdown of applied updates."
    - "<strong>Insights integration:</strong> If Insights Client is configured, show how the post-patch scan updates the host profile in Red Hat Insights automatically."
    - "<strong>Connect to the bigger picture:</strong> 'For a full enterprise workflow with snapshots and rollback, check out Patch Cloud Stack in AWS.'"
  talking_points:
    - "Check mode versus run mode is a powerful pattern — audit first, patch second, all from the same template."
    - "The HTML report is generated automatically on every run. Hand it to your change board or attach it to a ticket."
    - "Insights Client scanning after patching closes the loop — your compliance dashboard updates in near real-time."
    - "This is a single job template. For heterogeneous environments with Windows, snapshots, and rollback, we have a full workflow demo."
  related_demos:
    - "<strong>Patch Cloud Stack in AWS</strong> — Full enterprise patching workflow with snapshots, parallel RHEL/Windows paths, and automatic rollback"
    - "<strong>LINUX | Register with Insights</strong> — Register hosts with Red Hat Insights for advisory visibility and dynamic inventory"
    - "<strong>LINUX | Multi-profile Compliance Report</strong> — Run an OpenSCAP report to assess security posture before and after patching"

linux-compliance-workflow:
  description: >-
    A workflow that ties together compliance reporting, inventory refresh, and enforcement
    in a single execution. It first generates an OpenSCAP report against a chosen compliance
    profile (CIS, HIPAA, OSPP, PCI-DSS, or STIG), syncs the AWS inventory, and then
    enforces remediation on findings — giving you a before-and-after view of compliance posture.
  one_liner: "Scan, sync, and enforce compliance in one automated workflow"
  why_it_matters:
    - Compliance is a board-level concern — this demo shows automated enforcement, not just reporting
    - The scan-then-enforce pattern mirrors real-world change management workflows
    - Supporting five compliance profiles (CIS, HIPAA, OSPP, PCI-DSS, STIG) covers most regulated industries
    - Inventory sync between scan and enforce ensures AAP is working with current host data
    - The workflow structure makes the process auditable and repeatable
  prerequisites:
    - RHEL hosts in the <strong>Ansible Product Demos Inventory</strong>
    - SSH connectivity via <strong>APD Machine Credential</strong>
    - AWS credential configured (for inventory sync step)
    - (Recommended) Run <strong>Deploy Cloud Stack in AWS</strong> first to create target VMs
  survey_prompts:
    - question: Server Name or Pattern
      variable: _hosts
      type: text
      required: "Yes"
    - question: Compliance Profile
      variable: compliance_profile
      type: multiplechoice
      required: "Yes"
    - question: Use httpd on the target host(s) to access reports locally?
      variable: use_httpd
      type: multiplechoice
      required: "Yes"
  job_templates:
    - name: LINUX | Multi-profile Compliance Report
      playbook: linux/multi_profile_compliance_report.yml
      description: Runs an OpenSCAP scan against the selected compliance profile and generates an HTML report
    - name: AWS Inventory
      playbook: (inventory sync)
      description: Refreshes the AWS dynamic inventory to ensure host data is current before enforcement
    - name: LINUX | Compliance Enforce
      playbook: linux/remediate_out_of_compliance.yml
      description: Applies remediation for findings from the compliance scan
  walkthrough:
    - "<strong>Choose a profile:</strong> Show the survey and explain the compliance profile options. 'CIS and STIG are the most common — pick one that matches your audience.'"
    - "<strong>Launch the workflow:</strong> Start the workflow and show the three-node chain: Report → Inventory Sync → Enforce."
    - "<strong>Review the initial report:</strong> While the workflow runs, explain that the first node scans and generates an HTML report. 'This is our baseline — here is where we stand before remediation.'"
    - "<strong>Inventory sync:</strong> Point out the middle node. 'We refresh inventory between scan and enforce to make sure we are working with the latest host data.'"
    - "<strong>Enforcement results:</strong> After completion, show the enforce job output. Highlight specific remediation tasks that changed. 'Each of these is a compliance control being applied automatically.'"
    - "<strong>Re-run the report:</strong> For maximum impact, re-run just the compliance report template and compare before and after scores."
  talking_points:
    - "This is not just scanning — it is automated remediation. The workflow finds problems and fixes them."
    - "Five compliance profiles cover most regulated industries: finance (PCI-DSS), healthcare (HIPAA), government (STIG, OSPP), and general best practices (CIS)."
    - "The scan-sync-enforce pattern is how enterprises actually implement compliance. This demo mirrors that real-world workflow."
    - "Running the report before and after enforcement gives you a measurable delta — perfect for auditors and compliance officers."
  related_demos:
    - "<strong>LINUX | Multi-profile Compliance Report</strong> — Run the compliance report standalone to assess posture without enforcing"
    - "<strong>LINUX | DISA STIG</strong> — Apply DISA STIG hardening directly without the workflow wrapper"
    - "<strong>LINUX | Patching</strong> — Patch first, then run compliance to show a complete day-2 operations story"

windows-patching:
  description: >-
    Apply Windows updates by category to Windows Server hosts and generate an HTML patch report.
    The playbook uses the demo.patching.patch_windows role to install updates filtered by
    category (Security, Critical, Feature Packs, etc.), with optional reboot control. A report
    server is deployed automatically to publish patching results. Runs in check mode by default.
  one_liner: "Audit or apply Windows updates by category with automatic reporting"
  why_it_matters:
    - Windows patching is a top customer pain point — this demo proves AAP handles it natively
    - Category-based filtering (SecurityUpdates, CriticalUpdates, etc.) shows precision control over what gets installed
    - Check mode lets you preview updates before applying — critical for change management approval
    - The HTML report provides audit evidence without relying on WSUS or SCCM reporting
    - Reboot control via survey shows operational safety for production Windows servers
  prerequisites:
    - Windows hosts in the <strong>Ansible Product Demos Inventory</strong> (deployed by <strong>Deploy Cloud Stack in AWS</strong>)
    - WinRM connectivity via <strong>APD Machine Credential</strong>
    - A Windows report server (<code>aws_win1</code>) in the <code>os_windows</code> inventory group
  survey_prompts:
    - question: Server Name or Pattern
      variable: _hosts
      type: text
      required: "No"
    - question: Update categories
      variable: win_update_categories
      type: multiselect
      required: "No"
    - question: Reboot after install?
      variable: allow_reboot
      type: multiplechoice
      required: "No"
  walkthrough:
    - "<strong>Show the survey:</strong> Walk through the category selector. 'We can target just security updates, or cast a wider net. The operator chooses — not the tool.'"
    - "<strong>Launch in check mode:</strong> Run against the Windows hosts. 'Check mode queries Windows Update Agent without installing anything. We see exactly what would change.'"
    - "<strong>Review the output:</strong> Show which KBs are applicable per host. Point out the reboot-required indicators."
    - "<strong>Switch to run mode:</strong> Re-launch with job type set to Run. Highlight the reboot control option. 'In production, you might patch during a maintenance window and defer reboots.'"
    - "<strong>Show the report:</strong> Navigate to the report server and walk through the HTML patching report."
    - "<strong>Connect to the bigger picture:</strong> 'For environments with both Windows and RHEL, our Patch Cloud Stack workflow handles both in parallel with EBS snapshot rollback.'"
  talking_points:
    - "Ansible manages Windows natively through WinRM — no agent installation required on the target hosts."
    - "Category filtering means you can apply just security updates during an emergency patch cycle without pulling in feature packs."
    - "Check mode is your dry run. Show the change board exactly what will happen before you touch production."
    - "The reboot survey option is a small detail that matters in production — operators control when reboots happen, not the automation."
    - "This same patching pattern works on-prem, in AWS, or in Azure. The playbook does not care where the Windows host lives."
  related_demos:
    - "<strong>Patch Cloud Stack in AWS</strong> — Full workflow with EBS snapshots, parallel RHEL and Windows patching, and automatic rollback"
    - "<strong>WINDOWS | Install IIS</strong> — Quick Windows demo to show application deployment alongside patching"
    - "<strong>Setup Active Directory Domain</strong> — Provision a full AD environment to demonstrate domain-joined Windows patching"

windows-setup-ad-domain:
  description: >-
    A workflow that provisions a complete Active Directory environment from scratch in AWS.
    It creates a keypair, VPC, and three Windows VMs (one domain controller, two domain computers),
    syncs inventory, tests connectivity, promotes the domain controller, joins the computers
    to the domain, and validates both PowerShell and Kerberos connectivity. Includes automatic
    cleanup on failure.
  one_liner: "One-click Active Directory domain with infrastructure, domain join, and Kerberos validation"
  why_it_matters:
    - Standing up Active Directory is a multi-step process that teams spend hours on — this workflow does it in one click
    - Parallel VM creation demonstrates AAP workflow engine capabilities with dependency management
    - Automatic failure handling with resource cleanup shows enterprise-grade error recovery
    - Kerberos validation proves end-to-end domain functionality, not just VM provisioning
    - The workflow covers infrastructure, configuration, and validation — a complete lifecycle story
  prerequisites:
    - AWS credential configured with Access and Secret key
    - SSH public key for AWS keypair creation
    - <strong>APD Machine Credential</strong> with Windows administrator credentials
    - <strong>AAP Credential</strong> for Controller API callbacks during domain creation
  survey_prompts:
    - question: AWS Region
      variable: create_vm_aws_region
      type: multiplechoice
      required: "Yes"
    - question: Keypair Public Key
      variable: aws_public_key
      type: textarea
      required: "Yes"
    - question: Owner
      variable: create_vm_vm_owner
      type: text
      required: "Yes"
    - question: Environment
      variable: create_vm_vm_environment
      type: multiplechoice
      required: "Yes"
    - question: Subnet
      variable: create_vm_aws_vpc_subnet_name
      type: text
      required: "Yes"
    - question: Security Group
      variable: create_vm_aws_securitygroup_name
      type: text
      required: "Yes"
  job_templates:
    - name: Cloud | AWS | Create Keypair
      playbook: cloud/create_keypair.yml
      description: Creates an SSH keypair in the target AWS region
    - name: Cloud | AWS | Create VPC
      playbook: cloud/create_vpc.yml
      description: Provisions VPC, subnet, security group, and internet gateway
    - name: Cloud | AWS | Create VM (Domain Controller)
      playbook: cloud/create_vm.yml
      description: Deploys the dc01 Windows Server instance as domain controller
    - name: Cloud | AWS | Create VM (Computer 1 - winston)
      playbook: cloud/create_vm.yml
      description: Deploys the winston Windows Server instance as domain computer
    - name: Cloud | AWS | Create VM (Computer 2 - winthrop)
      playbook: cloud/create_vm.yml
      description: Deploys the winthrop Windows Server instance as domain computer
    - name: AWS Inventory
      playbook: (inventory sync)
      description: Syncs the AWS dynamic inventory to import the new VMs
    - name: WINDOWS | Test Connectivity
      playbook: windows/connect.yml
      description: Validates WinRM connectivity to all three Windows hosts
    - name: WINDOWS | AD | Create Domain
      playbook: windows/create_ad_domain.yml
      description: Promotes dc01 to domain controller and creates the ANSIBLE.LOCAL domain
    - name: WINDOWS | AD | Join Domain
      playbook: windows/join_ad_domain.yml
      description: Joins winston and winthrop to the Active Directory domain
    - name: WINDOWS | Run PowerShell (Validation)
      playbook: windows/powershell.yml
      description: Runs Get-ADComputer on the domain controller to list joined computers
    - name: WINDOWS | Run PowerShell | Kerberos (Validation)
      playbook: windows/powershell.yml
      description: Validates Kerberos authentication by querying Security event logs
    - name: WINDOWS | Rollback (Cleanup)
      playbook: windows/rollback.yml
      description: Cleans up resources if any workflow step fails
  walkthrough:
    - "<strong>Set the stage:</strong> Show the empty inventory — no domain hosts exist yet. Explain that the workflow will build everything from scratch."
    - "<strong>Walk through the survey:</strong> Fill in the region, owner, environment, subnet, and security group. 'Surveys make this self-service — a helpdesk operator does not need AWS console access.'"
    - "<strong>Launch and watch parallel creation:</strong> Point out the three VM nodes running simultaneously after VPC creation. 'One domain controller and two member computers, all deploying in parallel.'"
    - "<strong>Domain promotion:</strong> After connectivity tests pass, the workflow promotes dc01 to a domain controller. 'This is the equivalent of running dcpromo — fully automated.'"
    - "<strong>Domain join:</strong> Show winston and winthrop joining the domain. 'These machines are now domain members, ready for Group Policy, user management, and Kerberos auth.'"
    - "<strong>Validation:</strong> Highlight the dual validation — PowerShell queries AD for joined computers, Kerberos checks security event logs. 'We verify the domain actually works, not just that VMs exist.'"
  talking_points:
    - "This is a complete infrastructure-to-validation workflow. It provisions VMs, configures Active Directory, and proves it works — all in one click."
    - "Parallel VM creation with dependency management is a key AAP workflow feature. Three VMs deploy simultaneously, but domain join waits for all three to be ready."
    - "The automatic cleanup on failure means you never leave orphaned resources in AWS. If domain creation fails, everything rolls back."
    - "Kerberos validation is the real proof — it shows the domain is functional, not just provisioned."
    - "After this workflow completes, you can pivot to the Helpdesk New User demo to show AD user management."
  related_demos:
    - "<strong>WINDOWS | AD | New User</strong> — Create users in the domain built by this workflow for a helpdesk self-service demo"
    - "<strong>WINDOWS | Patching</strong> — Patch the domain-joined Windows hosts to show day-2 operations"
    - "<strong>Deploy Cloud Stack in AWS</strong> — The general-purpose infrastructure provisioning workflow for mixed OS environments"

network-panos-workflow:
  description: >-
    A workflow that provisions a Palo Alto Networks virtual firewall in AWS, configures it
    using the paloaltonetworks.panos collection, deploys a webserver behind it, and sets up
    security rules to demonstrate firewall policy management. Covers the full lifecycle from
    infrastructure provisioning through configuration and validation.
  one_liner: "Deploy and manage a Palo Alto firewall with security rule demos"
  why_it_matters:
    - Network security is a top priority — this demo shows AAP managing next-gen firewalls through certified collections
    - The paloaltonetworks.panos collection is API-driven, demonstrating agentless network automation
    - Provisioning infrastructure and configuring security policies in one workflow shows end-to-end capability
    - Live security rule toggling (allow/deny) provides a dramatic, visual demo moment
    - Covers a real vendor product (Palo Alto), not just lab devices — credibility with network teams
  prerequisites:
    - AWS credential configured with Access and Secret key
    - Subscribe to the <strong>VM-Series Next-Gen Virtual Firewall</strong> AMI in the AWS Marketplace (five-minute approval process)
    - Run APD setup with the network category to create the required credentials and templates
    - <strong>Palo Alto Firewall Admin</strong> credential (created by setup with placeholder values)
    - <strong>Palo Alto Bastion</strong> credential (created by setup with placeholder values)
  survey_prompts: []
  job_templates:
    - name: NETWORK | Panos | Deploy
      playbook: network/panos/deploy.yml
      description: Provisions the virtual firewall, bastion host, and webserver instances in AWS
    - name: Panos Demo Instances (Inventory Sync)
      playbook: (inventory sync)
      description: Syncs the dynamic inventory source to discover the newly created EC2 instances
    - name: NETWORK | Panos | Configure Firewall
      playbook: network/panos/configure_firewall.yml
      description: Applies initial firewall configuration using the paloaltonetworks.panos collection
    - name: NETWORK | Panos | Configure Webserver
      playbook: network/panos/configure_webserver.yml
      description: Configures a basic Apache webserver behind the firewall to demonstrate security rules
  walkthrough:
    - "<strong>Show the starting state:</strong> Display the empty inventory and the placeholder credentials. 'Nothing exists yet — the workflow builds everything from scratch.'"
    - "<strong>Launch the workflow:</strong> Start the workflow and explain the node sequence: Deploy → (parallel) Inventory Sync and Configure Firewall → Configure Webserver."
    - "<strong>Fill the wait time:</strong> The workflow takes roughly 25 minutes (mostly waiting for the virtual firewall to initialize). Use this time to walk through the architecture diagram and explain the three automation mechanisms: amazon.aws for provisioning, paloaltonetworks.panos for firewall config, and RHEL system roles for the webserver."
    - "<strong>Verify the deployment:</strong> After completion, open the firewall management portal at the management IP (HTTPS). Log in with admin credentials. Open the webserver at the public IP (HTTP) to confirm traffic flows."
    - "<strong>Toggle a security rule:</strong> Launch the <strong>NETWORK | Panos | Configure Security Rule</strong> job template. Accept the defaults to deny traffic. Refresh the webserver tab — it no longer loads."
    - "<strong>Show the firewall logs:</strong> In the Palo Alto management portal, navigate to Monitor → Traffic logs. Show the denied traffic entries. 'The firewall is enforcing the rule we just pushed via Ansible.'"
  talking_points:
    - "This is a real Palo Alto Networks firewall, not a simulator. The paloaltonetworks.panos collection is a certified, vendor-supported Ansible collection."
    - "API-driven configuration means no SSH to the firewall — everything goes through the PAN-OS management API. This is how modern network automation works."
    - "The live deny-then-allow demo is a crowd pleaser. People can see the webserver go down and come back up in real time."
    - "Three different automation mechanisms in one workflow — cloud provisioning, firewall API, and SSH-based Linux config — all orchestrated by AAP."
    - "After the demo, the Cleanup job template tears down all AWS resources. No orphaned instances, no surprise bills."
  related_demos:

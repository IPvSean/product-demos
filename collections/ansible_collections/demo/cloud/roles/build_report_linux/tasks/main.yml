---
- name: Install apache
  become: true
  ansible.builtin.dnf:
    name: httpd
    state: present

- name: Change apache to specified port
  become: true
  ansible.builtin.lineinfile:
    path: /etc/httpd/conf/httpd.conf
    regexp: '^Listen '
    insertafter: '^#Listen '
    line: 'Listen {{ web_port }}'

- name: Set nis_enabled flag on and keep it persistent across reboots
  become: true
  ansible.posix.seboolean:
    name: nis_enabled
    state: true
    persistent: true

- name: Start httpd
  become: true
  ansible.builtin.service:
    name: httpd
    state: started

- name: Create HTML report
  become: true
  ansible.builtin.template:
    src: report.j2
    dest: "{{ file_path }}/index.html"
    mode: "0644"

- name: Copy CSS over
  become: true
  ansible.builtin.copy:
    src: "css"
    dest: "{{ file_path }}"
    directory_mode: true
    mode: "0644"

- name: Copy image assets over
  become: true
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ file_path }}"
    directory_mode: true
    mode: "0644"
  loop:
    - "webpage_logo.png"
    - "redhat-ansible-logo.svg"
    - "aws.png"

- name: Print variables
  ansible.builtin.debug:
    var: hostvars['ansible-1']

- name: Retrieve public IP address
  ansible.builtin.uri:
    url: https://checkip.amazonaws.com
    return_content: true
  register: public_ip_report
  ignore_errors: true
  changed_when: false

- name: Display link to inventory report
  ansible.builtin.debug:
    msg:
      - "Please go to http://{{ (public_ip_report.content | default(ansible_fqdn)) | trim }}:{{ web_port }}"
      - "or just refresh the Cloud Report tab"
      - "at the top of your window if you using Instruqt labs!"

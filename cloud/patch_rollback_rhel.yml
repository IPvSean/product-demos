---
- name: Rollback specific RHEL CVE advisories
  hosts: "{{ _hosts | default('os_linux') }}"
  become: true
  gather_facts: false

  vars:
    _raw_cve_input: "{{ input_cve_ids | default('RHSA-2024:3138, CVE-2024-33599') }}"
    cve_advisory_ids: "{{ (_raw_cve_input.split(',') | map('trim') | list) if _raw_cve_input is string else _raw_cve_input }}"

  tasks:
    - name: Find DNF transaction IDs for the advisories
      ansible.builtin.shell: >
        set -o pipefail &&
        dnf history list {{ item }} | grep -m 1 {{ item }} | awk '{print $1}'
      loop: "{{ cve_advisory_ids }}"
      register: dnf_history_results
      changed_when: false
      failed_when: false

    - name: Undo the DNF transactions
      ansible.builtin.command:
        cmd: "dnf history undo {{ item.stdout }} -y"
      loop: "{{ dnf_history_results.results }}"
      register: undo_results
      when:
        - item.stdout is defined
        - item.stdout != ""
        - item.stdout is regex('^[0-9]+$')
      changed_when: true

    - name: Check reboot status after rollback
      ansible.builtin.command: needs-restarting -r
      register: reboot_check
      failed_when: false
      changed_when: false
      when: undo_results.results | selectattr('skipped', 'undefined') | list | length > 0

    - name: Set reboot_required fact
      ansible.builtin.set_fact:
        reboot_required: "{{ reboot_check.rc != 0 if reboot_check.rc is defined else false }}"
        cacheable: true

    - name: Final summary
      ansible.builtin.debug:
        msg:
          - "Processed Advisories: {{ cve_advisory_ids | join(', ') }}"
          - "Reboot Required: {{ 'YES' if reboot_required else 'NO' }}"

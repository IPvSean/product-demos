          choices:
            - us-east-1
            - us-east-2
            - us-west-1
            - us-west-2
        - question_name: Specify target hosts
          type: text
          variable: _hosts
          required: false

  - name: Cloud | AWS | Display EC2 Stats
    job_type: run
    organization: Ansible Product Demos (APD)
    credentials:
      - AWS
    project: Ansible Product Demos
    playbook: cloud/display-ec2-stats.yml
    inventory: Ansible Product Demos Inventory
    notification_templates_started: Telemetry
    notification_templates_success: Telemetry
    notification_templates_error: Telemetry

  - name: Cloud | AWS | Delete Stack VM
    job_type: run
    organization: Ansible Product Demos (APD)
    credentials:
      - AWS
    project: Ansible Product Demos
    playbook: cloud/delete_vm_by_name.yml
    inventory: Ansible Product Demos Inventory
    notification_templates_started: Telemetry

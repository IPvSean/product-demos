---
_deployment_id: "{{ lookup('file', playbook_dir + '/.deployment_id') }}"

user_message:
  - >-
    To enable automatic RHSM registration on unregistered RHEL hosts,
    update the 'RHSM Registration' credential in AAP with your org ID
    and activation key. https://access.redhat.com/management/activation_keys

controller_credential_types:
  - name: RHSM Activation Key
    kind: cloud
    inputs:
      fields:
        - id: rhsm_org_id
          type: string
          label: Organization ID
        - id: rhsm_activation_key
          type: string
          label: Activation Key
          secret: true
      required:
        - rhsm_org_id
        - rhsm_activation_key
    injectors:
      extra_vars:
        rhsm_org_id: !unsafe '{{ rhsm_org_id }}'
        rhsm_activation_key: !unsafe '{{ rhsm_activation_key }}'

controller_credentials:
  - name: RHSM Registration
    credential_type: RHSM Activation Key
    organization: Ansible Product Demos (APD)
    update_secrets: false
    state: exists
    inputs:
      rhsm_org_id: REPLACEME
      rhsm_activation_key: REPLACEME

controller_execution_environments:
  - name: TMM AWS EE
    image: quay.io/acme_corp/aws_ee
    organization: Ansible Product Demos (APD)
    pull: missing

controller_templates:
  - name: Cloud | AWS | Create Peer Infrastructure
    job_type: run
    organization: Ansible Product Demos (APD)
    credentials:
      - AWS
    project: Ansible Product Demos
    playbook: cloud/create_peer_network.yml
    inventory: Ansible Product Demos Inventory
    notification_templates_started: Telemetry
    notification_templates_success: Telemetry
    notification_templates_error: Telemetry

controller_workflows:
  - name: Deploy Cloud Stack in AWS
    description: A workflow to deploy a cloud stack
    organization: Ansible Product Demos (APD)
    notification_templates_started: Telemetry
    notification_templates_success: Telemetry
    notification_templates_error: Telemetry
    extra_vars:
      aws_key_name: aws-test-key
      create_vm_aws_keypair_name: aws-test-key
      create_vm_aws_securitygroup_name: aws-test-sg
      create_vm_aws_vpc_subnet_name: aws-test-subnet
      create_vm_vm_deployment: cloud_stack
      create_vm_vm_purpose: demo
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: AWS Region
          type: multiplechoice
          variable: create_vm_aws_region
          required: true
          choices:
            - us-east-1
            - us-east-2
            - us-west-1
            - us-west-2
        - question_name: Owner
          type: text
          variable: create_vm_aws_owner_tag
          required: true
        - question_name: Environment
          type: multiplechoice
          variable: vm_environment
          required: true
          choices:
            - Dev
            - QA
            - Prod
        - question_name: Email
          type: text
          variable: email
          required: true
    simplified_workflow_nodes:
      - identifier: Create Keypair
        unified_job_template: Cloud | AWS | Create Keypair
        success_nodes:
          - EC2 Stats
        failure_nodes:
          - Ticket - Keypair Failed
      - identifier: Create VPC
        unified_job_template: Cloud | AWS | Create VPC
        success_nodes:
          - EC2 Stats
        failure_nodes:
          - Ticket - VPC Failed
      - identifier: Ticket - Keypair Failed
        unified_job_template: 'SUBMIT FEEDBACK'
        extra_data:
          feedback: Failed to create AWS keypair
      - identifier: EC2 Stats
        unified_job_template: Cloud | AWS | Display EC2 Stats
        all_parents_must_converge: true
        always_nodes:
          - Deploy Windows GUI Blueprint
          - Deploy RHEL8 Blueprint
          - Deploy RHEL9 Blueprint
          - Deploy Windows Core Blueprint
          - Deploy Report Server
      - identifier: Deploy Windows GUI Blueprint
        unified_job_template: Cloud | AWS | Create VM
        extra_data:
          create_vm_vm_name: aws-dc
          vm_blueprint: windows_full
        success_nodes:
          - Update Inventory
        failure_nodes:
          - Ticket - Instance Failed
      - identifier: Deploy Windows Core Blueprint
        unified_job_template: Cloud | AWS | Create VM
        extra_data:
          create_vm_vm_name: aws_win1
          vm_blueprint: windows_core
        success_nodes:
          - Update Inventory
        failure_nodes:
          - Ticket - Instance Failed
      - identifier: Deploy RHEL8 Blueprint
        unified_job_template: Cloud | AWS | Create VM
        extra_data:
          create_vm_vm_name: aws_rhel8
          vm_blueprint: rhel8
        success_nodes:
          - Update Inventory
        failure_nodes:
          - Ticket - Instance Failed
      - identifier: Deploy RHEL9 Blueprint
        unified_job_template: Cloud | AWS | Create VM
        extra_data:
          create_vm_vm_name: aws_rhel9
          vm_blueprint: rhel9
        success_nodes:
          - Update Inventory
        failure_nodes:
          - Ticket - Instance Failed
      - identifier: Deploy Report Server
        unified_job_template: Cloud | AWS | Create VM
        extra_data:
          create_vm_vm_name: reports
          vm_blueprint: rhel9
        success_nodes:
          - Update Inventory
        failure_nodes:
          - Ticket - Instance Failed
      - identifier: Update Inventory
        unified_job_template: AWS Inventory
        success_nodes:
          - Publish VPC Report
      - identifier: Ticket - Instance Failed
        unified_job_template: 'SUBMIT FEEDBACK'
        extra_data:
          feedback: Failed to create AWS instance
      - identifier: Publish VPC Report
        unified_job_template: Cloud | AWS | VPC Report
      - identifier: Ticket - VPC Failed
        unified_job_template: 'SUBMIT FEEDBACK'
        extra_data:
          feedback: Failed to create AWS VPC

  - name: Destroy Cloud Stack in AWS
    description: Tear down the cloud stack VMs, VPC, and keypair created by Deploy Cloud Stack in AWS
    organization: Ansible Product Demos (APD)
    notification_templates_started: Telemetry
    notification_templates_success: Telemetry
    notification_templates_error: Telemetry
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: AWS Region
          type: multiplechoice
          variable: create_vm_aws_region
          required: true
          choices:
            - us-east-1
            - us-east-2
            - us-west-1
            - us-west-2
    simplified_workflow_nodes:
      - identifier: Delete Windows GUI VM
        unified_job_template: Cloud | AWS | Delete Stack VM
        extra_data:
          create_vm_vm_name: aws-dc
        success_nodes:
          - Delete Infrastructure
      - identifier: Delete Windows Core VM
        unified_job_template: Cloud | AWS | Delete Stack VM
        extra_data:
          create_vm_vm_name: aws_win1
        success_nodes:
          - Delete Infrastructure
      - identifier: Delete RHEL8 VM
        unified_job_template: Cloud | AWS | Delete Stack VM
        extra_data:
          create_vm_vm_name: aws_rhel8
        success_nodes:
          - Delete Infrastructure
      - identifier: Delete RHEL9 VM
        unified_job_template: Cloud | AWS | Delete Stack VM
        extra_data:
          create_vm_vm_name: aws_rhel9
        success_nodes:
          - Delete Infrastructure
      - identifier: Delete Report Server
        unified_job_template: Cloud | AWS | Delete Stack VM
        extra_data:
          create_vm_vm_name: reports
        success_nodes:
          - Delete Infrastructure
      - identifier: Delete Infrastructure
        unified_job_template: Cloud | AWS | Delete VPC
        all_parents_must_converge: true
        success_nodes:
          - Update Inventory
      - identifier: Delete Keypair
        unified_job_template: Cloud | AWS | Delete Keypair
        all_parents_must_converge: true
        success_nodes:
          - Update Inventory
      - identifier: Update Inventory
        unified_job_template: AWS Inventory
        all_parents_must_converge: true

  - name: Patch Cloud Stack in AWS
    description: >-
      Snapshot, pre-check, patch, post-check (or rollback on failure), and
      compliance report for both RHEL and Windows EC2 instances.
      Based on jopaik/patch_demo.
    organization: Ansible Product Demos (APD)
    allow_simultaneous: true
    notification_templates_started: Telemetry
    notification_templates_success: Telemetry
    notification_templates_error: Telemetry
    extra_vars:
      _hosts: os_linux
      _hosts_windows: os_windows
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: AWS Region
          type: multiplechoice
          variable: aws_region
          required: true
          default: us-east-1
          choices:
            - us-east-1
            - us-east-2
            - us-west-1
            - us-west-2
        - question_name: RHEL Advisory IDs (comma-separated)
          type: text
          variable: input_cve_ids
          required: false
          default: "RHSA-2024:3138, CVE-2024-33599"
        - question_name: Windows KB IDs (comma-separated)
          type: text
          variable: input_kb_ids
          required: false
          default: "KB5044284, KB5044030"
    simplified_workflow_nodes:
      - identifier: Take Snapshot
        unified_job_template: Cloud | AWS | Snapshot EC2
        success_nodes:
          - Pre-check RHEL
          - Pre-check Windows
      - identifier: Pre-check RHEL
        unified_job_template: Cloud | AWS | Patch Pre-check RHEL
        success_nodes:
          - Patch RHEL
      - identifier: Pre-check Windows
        unified_job_template: Cloud | AWS | Patch Pre-check Windows
        success_nodes:
          - Patch Windows
      - identifier: Patch RHEL
        unified_job_template: Cloud | AWS | Patch RHEL
        success_nodes:
          - Post-check RHEL
        failure_nodes:
          - Restore RHEL
      - identifier: Patch Windows
        unified_job_template: Cloud | AWS | Patch Windows
        success_nodes:
          - Post-check Windows
        failure_nodes:
          - Restore Windows
      - identifier: Post-check RHEL
        unified_job_template: Cloud | AWS | Patch Post-check RHEL
        always_nodes:
          - Compliance Report
      - identifier: Restore RHEL
        unified_job_template: Cloud | AWS | Restore EC2 from Snapshot
      - identifier: Post-check Windows
        unified_job_template: Cloud | AWS | Patch Post-check Windows
        always_nodes:
          - Compliance Report
      - identifier: Restore Windows
        unified_job_template: Cloud | AWS | Restore EC2 from Snapshot
      - identifier: Compliance Report
        unified_job_template: Cloud | AWS | Patch Compliance Report
        all_parents_must_converge: true

---
- name: Pre-check patch applicability - RHEL
  hosts: "{{ _hosts | default('os_linux') }}"
  become: true
  gather_facts: true

  vars:
    _raw_cve_input: "{{ input_cve_ids | default('RHSA-2024:3138, CVE-2024-33599') }}"
    cve_advisory_ids: >-
      {% if _raw_cve_input is string %}
        {{ (_raw_cve_input | replace(',', ' ')).split() | map('trim') | list }}
      {% else %}
        {{ _raw_cve_input }}
      {% endif %}

  tasks:
    - name: Query DNF for targeted advisories
      ansible.builtin.command: "dnf updateinfo list --advisory {{ cve_advisory_ids | join(' ') }}"
      register: rhel_check
      changed_when: false

    - name: Identify missing RHEL advisories
      ansible.builtin.set_fact:
        missing_patches: "{{ cve_advisory_ids | select('in', rhel_check.stdout) | list }}"

    - name: Set RHEL status fact
      ansible.builtin.set_fact:
        patch_needed: "{{ missing_patches | length > 0 }}"

    - name: Summary of RHEL pre-check
      ansible.builtin.debug:
        msg: >
          System: {{ inventory_hostname }} |
          Missing Items: {{ missing_patches | join(', ') if missing_patches else 'None' }} |
          Execution Recommended: {{ 'YES' if patch_needed else 'NO (System Compliant)' }}

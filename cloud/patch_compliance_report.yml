---
- name: Gather patch compliance data
  hosts: "{{ _hosts | default('os_linux') }}:{{ _hosts_windows | default('os_windows') }}"
  gather_facts: true

  vars:
    _raw_cve_input: "{{ input_cve_ids | default('RHSA-2024:3138, CVE-2024-33599') }}"
    cve_advisory_ids: "{{ (_raw_cve_input.split(',') | map('trim') | list) if _raw_cve_input is string else _raw_cve_input }}"
    _raw_kb_input: "{{ input_kb_ids | default('KB5044284, KB5044030') }}"
    target_kb_ids: "{{ (_raw_kb_input.split(',') | map('trim') | list) if _raw_kb_input is string else _raw_kb_input }}"

  tasks:
    - name: RHEL audit block
      when: ansible_os_family == "RedHat"
      become: true
      block:
        - name: Ensure RHSM registration
          ansible.builtin.include_tasks: tasks/rhsm_ensure_registered.yml

        - name: Check RHEL for targeted advisories
          ansible.builtin.command: "dnf updateinfo list --advisory {{ cve_advisory_ids | join(' ') }}"
          register: rhel_target_check
          changed_when: false
          when: rhsm_registered

        - name: Get all missing security advisories
          ansible.builtin.command: "dnf updateinfo list security --quiet"
          register: rhel_all_vulns
          changed_when: false
          when: rhsm_registered

        - name: Check if RHEL needs a reboot
          ansible.builtin.command: "needs-restarting -r"
          register: rhel_reboot_check
          failed_when: false
          changed_when: false
          when: rhsm_registered

        - name: Set RHEL compliance facts (registered host)
          ansible.builtin.set_fact:
            missing_targets: "{{ cve_advisory_ids | select('in', rhel_target_check.stdout | default('')) | list }}"
            full_vulns: >-
              {{ rhel_all_vulns.stdout_lines | default([])
                 | map('regex_search', '(RHSA-\d{4}:\d+|CVE-\d{4}-\d+)')
                 | select('string') | list | unique }}
            reboot_needed: "{{ 'YES' if rhel_reboot_check.rc != 0 else 'NO' }}"
            cacheable: true
          when: rhsm_registered

        - name: Set RHEL compliance facts (unregistered host)
          ansible.builtin.set_fact:
            missing_targets: []
            full_vulns: []
            reboot_needed: "N/A"
            cacheable: true
          when: rhsm_unregistered | default(false)

        - name: Set RHEL compliance status
          ansible.builtin.set_fact:
            compliance_status: "{{ 'UNREGISTERED' if rhsm_unregistered | default(false) else ('VULNERABLE' if (missing_targets | length > 0) else 'COMPLIANT') }}"
            cacheable: true

    - name: Windows audit block
      when: ansible_os_family == "Windows"
      block:
        - name: Force Windows Update scan
          ansible.windows.win_shell: |
            $updateSession = New-Object -ComObject Microsoft.Update.Session
            $updateSearcher = $updateSession.CreateUpdateSearcher()
            $searchResult = $updateSearcher.Search("IsInstalled=0")
            Write-Output "Found $($searchResult.Updates.Count) missing updates"
          register: win_force_scan
          changed_when: false

        - name: Discover all missing Windows KBs
          ansible.windows.win_updates:
            category_names:
              - SecurityUpdates
              - CriticalUpdates
              - Updates
              - DefinitionUpdates
            state: searched
          register: win_all_check

        - name: Check for Windows pending reboot
          ansible.windows.win_shell: |
            $reboot = $false
            if (Get-ItemProperty "HKLM:\Software\Microsoft\Windows\CurrentVersion\Component Based Servicing\RebootPending" -ErrorAction SilentlyContinue) { $reboot = $true }
            if (Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsUpdate\Auto Update\RebootRequired" -ErrorAction SilentlyContinue) { $reboot = $true }
            $reboot
          register: win_reboot_check
          changed_when: false

        - name: Set Windows vulnerability facts
          ansible.builtin.set_fact:
            missing_targets: "{{ win_all_check.updates | selectattr('kb', 'defined') | map(attribute='kb') | select('in', target_kb_ids) | list }}"
            full_vulns: "{{ win_all_check.updates | selectattr('kb', 'defined') | map(attribute='kb') | list }}"
            reboot_needed: "{{ 'YES' if 'True' in win_reboot_check.stdout else 'NO' }}"
            win_total_scanned: "{{ win_force_scan.stdout_lines[0] | default('Scan results unavailable') }}"
            cacheable: true

        - name: Set Windows compliance status
          ansible.builtin.set_fact:
            compliance_status: "{{ 'VULNERABLE' if (missing_targets | length > 0) else 'COMPLIANT' }}"
            cacheable: true

    - name: Display compliance summary
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Status: {{ compliance_status | default('UNKNOWN') }}"
          - "Missing Targets: {{ missing_targets | default([]) | join(', ') or 'None' }}"
          - "Reboot Needed: {{ reboot_needed | default('UNKNOWN') }}"

- name: Generate patch compliance report
  hosts: "{{ _report_server | default('reports') }}"
  become: true
  gather_facts: true

  vars:
    _raw_cve_input: "{{ input_cve_ids | default('RHSA-2024:3138, CVE-2024-33599') }}"
    cve_advisory_ids: "{{ (_raw_cve_input.split(',') | map('trim') | list) if _raw_cve_input is string else _raw_cve_input }}"
    _raw_kb_input: "{{ input_kb_ids | default('KB5044284, KB5044030') }}"
    target_kb_ids: "{{ (_raw_kb_input.split(',') | map('trim') | list) if _raw_kb_input is string else _raw_kb_input }}"
    audit_hosts: "{{ groups[_hosts | default('os_linux')] | default([]) + groups[_hosts_windows | default('os_windows')] | default([]) }}"

  tasks:
    - name: Install httpd
      ansible.builtin.dnf:
        name: httpd
        state: present

    - name: Start and enable httpd
      ansible.builtin.service:
        name: httpd
        state: started
        enabled: true

    - name: Generate HTML compliance report
      ansible.builtin.copy:
        dest: /var/www/html/patch_report.html
        mode: "0644"
        content: |
          <!DOCTYPE html>
          <html>
          <head>
              <title>Patch Compliance Report</title>
              <style>
                  body { font-family: 'Red Hat Display', 'Segoe UI', sans-serif; margin: 20px; background-color: #f0f0f0; }
                  .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 98%; margin: auto; }
                  .report-header { display: flex; align-items: center; gap: 18px; margin-bottom: 10px; }
                  .report-header img { height: 42px; }
                  .report-header h1 { margin: 0; font-size: 1.6em; }
                  table { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; }
                  th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; vertical-align: top; word-wrap: break-word; }
                  th { background-color: #1a1a2e; color: white; }
                  .VULNERABLE { color: #c9190b; font-weight: bold; }
                  .COMPLIANT { color: #3e8635; font-weight: bold; }
                  .UNREGISTERED { color: #6a6e73; font-weight: bold; font-style: italic; }
                  .reboot-YES { color: #f0ab00; font-weight: bold; }
                  .reboot-NO { color: #adb5bd; }
                  .vuln-tag { display: inline-block; background: #e9ecef; color: #495057; padding: 2px 8px; border-radius: 4px; margin: 2px; font-size: 11px; font-family: 'Red Hat Mono', 'Courier New', monospace; border: 1px solid #dee2e6; }
                  .review-box { background-color: #e7f1fa; border: 1px solid #bee1f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
                  .warning-box { background-color: #fdf7e7; border: 1px solid #f0ab00; padding: 15px; border-radius: 8px; margin-top: 20px; }
                  .warning-box h3 { margin-top: 0; color: #795600; }
                  .report-footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid #dee2e6; display: flex; align-items: center; gap: 8px; font-size: 13px; color: #6a6e73; }
                  .report-footer a { color: #06c; text-decoration: none; }
                  .report-footer a:hover { text-decoration: underline; }
                  .report-footer svg { vertical-align: middle; }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="report-header">
                      <img src="data:image/png;base64, xtYLQvYBSTlPNJcMeecV/Pn+0d44+Hfj/4jy618MvBa+BNKjgV4HsFmaYPPG77ptzchei MAcYPagDwWiiigAooooAKKKKACiiigAooooAKKKKAP/Q/FLwH8TtQ8JAWF2putOJzsz8yZ6lT/SvpTTPFXg/wAY2oiSaGbcOYZgAw " alt="Red Hat Ansible Automation Platform">
                      <h1>Patch Compliance Dashboard</h1>
                  </div>
                  <div class="review-box">
                      <h3 style="margin-top: 0; color: #06c;">Audit Targets</h3>
                      <div style="display: flex; gap: 40px;">
                          <div>
                              <strong>RHEL Advisories:</strong><br>
                              {% for cve in cve_advisory_ids %}
                                  <span class="vuln-tag" style="background: #cce3f5;">{{ cve }}</span>
                              {% endfor %}
                          </div>
                          <div>
                              <strong>Windows KBs:</strong><br>
                              {% for kb in target_kb_ids %}
                                  <span class="vuln-tag" style="background: #cce3f5;">{{ kb }}</span>
                              {% endfor %}
                          </div>
                      </div>
                  </div>
                  <p><strong>Report Generated:</strong> {{ ansible_date_time.iso8601 }}</p>
                  <table>
                      <tr>
                          <th style="width: 12%;">Host</th>
                          <th style="width: 10%;">Status</th>
                          <th style="width: 15%;">Missing Targeted</th>
                          <th style="width: 10%;">Reboot</th>
                          <th style="width: 53%;">All Vulnerabilities</th>
                      </tr>
                      {% for host in audit_hosts %}
                        {% if hostvars[host] is defined and hostvars[host].compliance_status is defined %}
                        <tr{% if hostvars[host].compliance_status == 'UNREGISTERED' %} style="background-color: #f9f5ee;"{% endif %}>
                            <td>{{ host }}</td>
                            <td><span class="{{ hostvars[host].compliance_status }}">{{ hostvars[host].compliance_status }}</span></td>
                            {% if hostvars[host].compliance_status == 'UNREGISTERED' %}
                            <td><span style="color: #6a6e73; font-style: italic;">Unable to check</span></td>
                            <td><span style="color: #6a6e73; font-style: italic;">Unknown</span></td>
                            <td><span style="color: #c9190b; font-style: italic;">&#9888; Cannot scan — host is not registered with RHSM</span></td>
                            {% else %}
                            <td>{{ hostvars[host].missing_targets | join(', ') if hostvars[host].missing_targets else 'None' }}</td>
                            <td><span class="reboot-{{ hostvars[host].reboot_needed }}">{{ hostvars[host].reboot_needed }}</span></td>
                            <td>
                                {% if hostvars[host].full_vulns %}
                                    {% for vuln in hostvars[host].full_vulns %}
                                        <span class="vuln-tag">{{ vuln }}</span>
                                    {% endfor %}
                                {% else %}
                                    <span style="color: #3e8635; font-style: italic;">No additional vulnerabilities</span>
                                {% endif %}
                            </td>
                            {% endif %}
                        </tr>
                        {% endif %}
                      {% endfor %}
                  </table>
                  {% set unregistered_count = audit_hosts | map('extract', hostvars) | selectattr('compliance_status', 'defined') | selectattr('compliance_status', 'equalto', 'UNREGISTERED') | list | length %}
                  {% if unregistered_count > 0 %}
                  <div class="warning-box">
                      <h3>&#9888; {{ unregistered_count }} host{{ 's' if unregistered_count > 1 }} not registered with RHSM</h3>
                      <p style="margin-bottom: 8px;">Unregistered RHEL hosts cannot be scanned for vulnerabilities or patched. To register them:</p>
                      <ol style="margin: 0; padding-left: 20px;">
                          <li>In AAP, go to <strong>Resources &rarr; Credentials &rarr; RHSM Registration</strong></li>
                          <li>Enter your Red Hat <strong>Org ID</strong> and <strong>Activation Key</strong></li>
                          <li>Re-run this workflow &mdash; hosts will be auto-registered and patched</li>
                      </ol>
                      <p style="margin-top: 8px; margin-bottom: 0; font-size: 12px; color: #6a6e73;">
                          Find your org ID at <a href="https://access.redhat.com/management">access.redhat.com/management</a>
                          &bull; Create activation keys at <a href="https://access.redhat.com/management/activation_keys">Activation Keys</a>
                      </p>
                  </div>
                  {% endif %}
                  <div class="report-footer">
                      <svg height="20" width="20" viewBox="0 0 16 16" fill="#24292f"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                      <span>Source: <a href="https://github.com/ansible/product-demos" target="_blank">github.com/ansible/product-demos</a> &mdash; Ansible Product Demos</span>
                  </div>
              </div>
          </body>
          </html>
      changed_when: true

    - name: Retrieve public IP address
      ansible.builtin.uri:
        url: https://checkip.amazonaws.com
        return_content: true
      register: public_ip_report
      ignore_errors: true
      changed_when: false

    - name: Display report URL
      ansible.builtin.debug:
        msg: "Compliance report available at http://{{ (public_ip_report.content | default(ansible_host)) | trim }}/patch_report.html"

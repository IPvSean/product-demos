---
- name: Targeted Windows security patching
  hosts: "{{ _hosts | default('os_windows') }}"
  gather_facts: false

  vars:
    default_kb_list:
      - KB5044284
      - KB5044030
    target_kb_ids: >-
      {% if input_kb_ids is defined and input_kb_ids is string and input_kb_ids | length > 0 %}
        {{ input_kb_ids.split(',') | map('trim') | list }}
      {% elif input_kb_ids is defined and input_kb_ids is iterable and input_kb_ids is not string %}
        {{ input_kb_ids }}
      {% else %}
        {{ default_kb_list }}
      {% endif %}

  tasks:
    - name: Search and install specific updates
      ansible.windows.win_updates:
        category_names:
          - DefinitionUpdates
          - SecurityUpdates
          - CriticalUpdates
        accept_list: "{{ target_kb_ids | map('regex_replace', '^(.*)$', '.*\\1.*') | list }}"
        state: installed
      register: kb_patch_result

    - name: Set cacheable reboot flag
      ansible.builtin.set_fact:
        windows_reboot_needed: "{{ kb_patch_result.reboot_required | default(false) }}"
        cacheable: true

    - name: Audit output
      ansible.builtin.debug:
        msg:
          - "Target KBs: {{ target_kb_ids | join(', ') }}"
          - "Found matching updates: {{ kb_patch_result.found_update_count | default(0) }}"
          - "Installed successfully: {{ kb_patch_result.installed_update_count | default(0) }}"
          - "Reboot Required: {{ windows_reboot_needed }}"
